<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 480px;
        margin: 48px auto;
        padding: 0 16px;
        line-height: 1.5;
      }

      .card {
        border: 1px solid #d4d4d8;
        border-radius: 12px;
        padding: 24px;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      input,
      button {
        box-sizing: border-box;
        padding: 10px 12px;
        margin-top: 8px;
        margin-bottom: 16px;
      }

      .error {
        color: #b91c1c;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="login-title">Login</h1>
      <p>Use this page to practice Selenium form automation.</p>
      {% if error %}
      <p id="login-error" class="error">{{ error }}</p>
      {% endif %}
      <form id="login-form" method="post">
        {% csrf_token %}
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          value="{{ username|default:'' }}"
          autocomplete="username"
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
        />

        <button id="login-submit" type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
